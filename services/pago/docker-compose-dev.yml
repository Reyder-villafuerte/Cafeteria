name: pago-dev

services:
  mysql-pago-dev:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_pago
    ports:
      - "3394:3306" # MySQL dev pago
    volumes:
      - mysql_pago_dev_data:/var/lib/mysql

volumes:
  mysql_pago_dev_data: